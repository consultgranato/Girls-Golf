<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzD7Z_IqD6NvhzNm4f6uvFpD8stlUiMWpLeDoa2PSVvEeUoHJcJjV1RV2gjOxnVWObk/exec";
</script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a5d2e 0%, #2d8a47 100%);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    -webkit-text-size-adjust: 100%;
  }
  .card {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    width: 100%;
    max-width: 420px;
    padding: 28px 22px;
    animation: pop 0.4s ease;
  }
  @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .flag { font-size: 44px; text-align: center; margin-bottom: 4px; }
  h1 {
    text-align: center;
    color: #1a5d2e;
    font-size: 22px;
    margin-bottom: 4px;
  }
  .sub { text-align: center; color: #777; font-size: 14px; margin-bottom: 26px; }
  label { display: block; font-weight: 600; color: #333; font-size: 14px; margin-bottom: 6px; }
  input {
    width: 100%;
    padding: 15px 14px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    font-size: 16px;
    margin-bottom: 18px;
    transition: border 0.2s;
    -webkit-appearance: none;
    appearance: none;
    background: #fff;
    min-height: 52px;
  }
  input:focus { outline: none; border-color: #2d8a47; }
  button {
    width: 100%;
    padding: 16px;
    background: #2d8a47;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  button:hover { background: #1a5d2e; }
  button:active { transform: scale(0.98); }
  button:disabled { background: #aaa; cursor: not-allowed; }
  .success {
    text-align: center;
    display: none;
  }
  .success .check { font-size: 64px; margin-bottom: 12px; }
  .success h2 { color: #1a5d2e; margin-bottom: 8px; }
  .success p { color: #666; margin-bottom: 20px; }
  .error { color: #c0392b; font-size: 14px; text-align: center; margin-top: 10px; display: none; }
</style>

<div class="card">
  <div id="formView">
    <div class="flag">⛳</div>
    <h1>Girls Golf Attendance</h1>
    <p class="sub">Check in for today's practice or match</p>

    <label for="firstName">First Name</label>
    <input type="text" id="firstName" placeholder="Jane" autocomplete="given-name">

    <label for="lastName">Last Name</label>
    <input type="text" id="lastName" placeholder="Smith" autocomplete="family-name">

    <label for="date">Date</label>
    <input type="date" id="date">

    <button id="submitBtn" onclick="submitForm()">Check In ✓</button>
    <p class="error" id="errorMsg"></p>
  </div>

  <div class="success" id="successView">
    <div class="check">✅</div>
    <h2>You're checked in!</h2>
    <p id="successText"></p>
    <button onclick="resetForm()">Check in another player</button>
  </div>
</div>

<script>
  // Default date to today
  document.getElementById('date').value = new Date().toISOString().split('T')[0];

  async function submitForm() {
    const firstName = document.getElementById('firstName').value.trim();
    const lastName = document.getElementById('lastName').value.trim();
    const date = document.getElementById('date').value;
    const err = document.getElementById('errorMsg');
    const btn = document.getElementById('submitBtn');

    err.style.display = 'none';

    if (!firstName || !lastName || !date) {
      err.textContent = 'Please fill in all fields.';
      err.style.display = 'block';
      return;
    }
    if (SCRIPT_URL === "PASTE_YOUR_URL_HERE") {
      err.textContent = 'Setup needed: paste your Apps Script URL at the top of the code.';
      err.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Checking in...';

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ firstName, lastName, date })
      });
      // no-cors means we can't read the response, but the row gets written
      document.getElementById('successText').textContent =
        firstName + ' ' + lastName + ' — marked present for ' + date;
      document.getElementById('formView').style.display = 'none';
      document.getElementById('successView').style.display = 'block';
    } catch (e) {
      err.textContent = 'Something went wrong. Try again.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Check In ✓';
    }
  }

  function resetForm() {
    document.getElementById('firstName').value = '';
    document.getElementById('lastName').value = '';
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = 'Check In ✓';
    document.getElementById('successView').style.display = 'none';
    document.getElementById('formView').style.display = 'block';
  }
</script>
